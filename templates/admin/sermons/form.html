{% extends 'admin/base_admin.html' %} {% load static %} {% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card">
        <div class="card-header">
          <h4 class="mb-0">Add New Sermon</h4>
        </div>
        <div class="card-body">
          <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label for="title" class="form-label">Sermon Title</label>
              <input
                type="text"
                class="form-control"
                id="title"
                name="title"
                required
              />
            </div>
            <div class="mb-3">
              <label for="youtube_url" class="form-label">YouTube URL</label>
              <input
                type="url"
                class="form-control"
                id="youtube_url"
                name="youtube_url"
                required
              />
            </div>
            <div class="mb-3">
              <label for="date_posted" class="form-label">Date Posted</label>
              <input
                type="date"
                class="form-control"
                id="date_posted"
                name="date_posted"
                required
              />
            </div>
            <div class="mb-3">
              <label for="description" class="form-label">Description</label>
              <textarea
                class="form-control"
                id="description"
                name="description"
                rows="4"
                required
              ></textarea>
            </div>
            <div class="text-end">
              <button type="submit" class="btn btn-primary">Add Sermon</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
